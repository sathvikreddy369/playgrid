version: '3.8'
services:
  db:
    image: postgres:15
    container_name: playgrid_db
    environment:
      POSTGRES_USER: playgrid
      POSTGRES_PASSWORD: playgrid_password
      POSTGRES_DB: playgrid_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
